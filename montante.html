<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BetTracker Pro - Montante</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>

    <header class="glass">
        <span>BetTracker <b style="color:var(--accent)">PRO</b></span>
        <div class="theme-toggle" onclick="toggleTheme()">🌓</div>
    </header>

    <div id="toast-container"></div>

    <div class="container">
        <div class="card glass" style="border-left: 4px solid var(--info);">
            <h3>Objectif</h3>
            <div><small>Objectif Final (FC)</small><input type="number" id="mon-target" value="1000" min="1" oninput="saveConfig()"></div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <input type="number" id="mon-c-min" step="0.01" value="1.30" min="1.01" oninput="saveConfig()">
                <input type="number" id="mon-c-max" step="0.01" value="1.80" min="1.01" oninput="saveConfig()">
            </div>
            
            <div class="progress-container">
                <div id="mon-progress-bar" class="progress-fill"></div>
                <div id="mon-progress-text" class="progress-text">0%</div>
            </div>

            <div id="ui-prediction" style="background:linear-gradient(135deg, var(--info), var(--accent)); color:white; padding:12px; border-radius:12px; margin-top:12px; text-align:center; font-size:0.9rem; font-weight:600; box-shadow: 0 4px 15px rgba(0,0,0,0.2);"></div>
        </div>
        <div class="credit-card cc-montante" style="margin-bottom: 20px;">
            <div class="cc-glow" style="background: rgba(255,255,255,0.2);"></div>
            <div style="display: flex; justify-content: space-between; align-items: flex-start; z-index: 1; position: relative;">
                <div>
                    <div class="cc-title" style="margin-top: 0;">Cagnotte Montante Actuelle</div>
                    <div class="cc-value" id="ui-bankroll-montante" style="text-shadow: none;">0.00 FC</div>
                </div>
                <button onclick="resetMontante()" style="background:var(--danger); width:auto; padding:8px 12px; font-size:0.8rem; margin:0; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4); border-radius: 8px; font-weight: bold;">Archiver 🔄</button>
            </div>
            <div style="position: absolute; bottom: 20px; right: 25px; opacity: 0.5;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
            </div>
        </div>
        <div class="card glass">
            <h3>Prochaine Étape</h3>
            <form id="form-montante">
                <textarea id="mon-match" placeholder="Détails étape..." required></textarea>
                <div style="display:flex; gap:10px; align-items: flex-start;">
                    <input type="number" step="0.01" id="mon-odds" placeholder="Cote" min="1.01" required>
                    <div style="display:flex; width: 100%;">
                        <input type="number" step="0.01" id="mon-stake" placeholder="Mise" min="0.01" required>
                        <button type="button" class="btn-max" onclick="setAllInMontante()">MAX</button>
                    </div>
                </div>
                <button type="submit" class="btn-info">Placer l'Étape</button>
            </form>
        </div>
        <div id="montante-list"></div>
        <div class="card glass" style="margin-top: 20px;">
            <h3>Historique des Archives</h3>
            <div id="archives-list"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></span>Accueil</a>
        <a href="paris.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="22" y1="12" x2="18" y2="12"></line><line x1="6" y1="12" x2="2" y2="12"></line><line x1="12" y1="6" x2="12" y2="2"></line><line x1="12" y1="22" x2="12" y2="18"></line></svg></span>Paris</a>
        <a href="montante.html" class="nav-item active"><span class="nav-icon"><svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg></span>Montante</a>
        <a href="transactions.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg></span>Flux</a>
        <a href="outils.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg></span>Outils</a>
    </nav>

    <script src="app.js"></script>
</body>
</html>
