<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BetTracker Pro - Accueil</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash-screen"><div class="splash-logo">BetTracker<span style="color:var(--text-main)">PRO</span></div></div>

    <header class="glass">
        <span>BetTracker <b style="color:var(--accent)">PRO</b></span>
        <div class="theme-toggle" onclick="toggleTheme()">🌓</div>
    </header>

    <div id="toast-container"></div>

    <!-- Bannière d'installation PWA -->
    <div id="pwa-install-banner" style="display:none; position:fixed; bottom:90px; left:15px; right:15px; z-index:5000; background:linear-gradient(135deg,#1e293b,#0f172a); border:1px solid rgba(16,185,129,0.4); border-radius:18px; padding:18px; box-shadow:0 10px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(16,185,129,0.1); align-items:center; gap:14px; animation:fadeIn 0.5s ease-out;">
        <img src="icon.svg" width="48" height="48" style="border-radius:12px; flex-shrink:0;">
        <div style="flex-grow:1;">
            <div style="font-weight:700; font-size:1rem; color:#f8fafc;">BetTracker PRO</div>
            <div style="font-size:0.8rem; color:#94a3b8; margin-top:2px;">Installer sur l'écran d'accueil</div>
        </div>
        <div style="display:flex; gap:8px; flex-shrink:0;">
            <button id="btn-dismiss-pwa" onclick="document.getElementById('pwa-install-banner').style.display='none'" style="background:rgba(255,255,255,0.08); color:#94a3b8; padding:8px 12px; border-radius:10px; font-size:0.85rem; margin:0; width:auto;">✕</button>
            <button id="btn-install-pwa" style="background:linear-gradient(135deg,#10b981,#059669); color:white; padding:8px 16px; border-radius:10px; font-size:0.85rem; font-weight:700; margin:0; width:auto; box-shadow:0 4px 15px rgba(16,185,129,0.3);">Installer</button>
        </div>
    </div>

    <div class="container">
        <div class="credit-card cc-general" style="margin-bottom: 5px;">
            <div class="cc-glow"></div>
            <div>
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div class="cc-chip"></div>
                    <span style="font-weight:800; font-size:1.3rem; color: var(--accent);">PRO</span>
                </div>
                <div class="cc-title">Bankroll Générale (FC)</div>
                <div class="cc-value" id="ui-bankroll">0.00</div>
            </div>
        </div>
        <div class="filter-bar" style="margin-bottom:15px;">
            <button class="filter-btn active" onclick="setFilter('all', this)">Tout</button>
            <button class="filter-btn" onclick="setFilter('today', this)">Aujourd'hui</button>
            <button class="filter-btn" onclick="setFilter('week', this)">Semaine</button>
            <button class="filter-btn" onclick="setFilter('month', this)">Mois</button>
        </div>
        <div class="card glass">
            <canvas id="chart-main"></canvas>
        </div>
        <div class="card glass" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: center;">
            <div><small id="label-roi">ROI (Période)</small><div id="ui-roi" style="font-weight:bold; color:var(--accent);">0%</div></div>
            <div><small id="label-profit">Profit (Période)</small><div id="ui-profit" style="font-weight:bold;">0.00</div></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></span>Accueil</a>
        <a href="paris.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="22" y1="12" x2="18" y2="12"></line><line x1="6" y1="12" x2="2" y2="12"></line><line x1="12" y1="6" x2="12" y2="2"></line><line x1="12" y1="22" x2="12" y2="18"></line></svg></span>Paris</a>
        <a href="montante.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg></span>Montante</a>
        <a href="transactions.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg></span>Flux</a>
        <a href="outils.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg></span>Outils</a>
    </nav>

    <script src="app.js"></script>
</body>
</html>
