<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BetTracker Pro - Paris</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="glass">
        <span>BetTracker <b style="color:var(--accent)">PRO</b></span>
        <div class="theme-toggle" onclick="toggleTheme()">🌓</div>
    </header>

    <div id="toast-container"></div>

    <div class="container">
        <div class="card glass">
            <h3>Pari Classique</h3>
            <form id="form-bet">
                <select id="bet-type"><option value="simple">Simple</option><option value="combine">Combiné</option></select>
                <textarea id="bet-match" placeholder="Événements..." required></textarea>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="bet-tag" placeholder="Tag">
                    <input type="number" step="0.01" id="bet-odds" placeholder="Cote" min="1.01" required>
                    <input type="number" step="0.01" id="bet-stake" placeholder="Mise" min="0.01" required>
                </div>
                <button type="submit" class="btn-primary">Enregistrer</button>
            </form>
        </div>
        <input type="text" id="search-bet" class="glass" placeholder="🔍 Rechercher match ou tag..." style="margin-bottom:10px; padding:12px; width:100%; border-radius:10px; border:none; background:rgba(120,120,120,0.1); color:var(--text-main);">
        <div id="bets-list"></div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></span>Accueil</a>
        <a href="paris.html" class="nav-item active"><span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="22" y1="12" x2="18" y2="12"></line><line x1="6" y1="12" x2="2" y2="12"></line><line x1="12" y1="6" x2="12" y2="2"></line><line x1="12" y1="22" x2="12" y2="18"></line></svg></span>Paris</a>
        <a href="montante.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg></span>Montante</a>
        <a href="transactions.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg></span>Flux</a>
        <a href="outils.html" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg></span>Outils</a>
    </nav>

    <script src="app.js"></script>
</body>
</html>
